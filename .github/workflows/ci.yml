name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Backend unit and integration tests
        working-directory: backend
        run: mvn test

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Start backend
        working-directory: backend
        run: nohup mvn spring-boot:run > backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/api/dashboard && exit 0
            sleep 2
          done
          exit 1

      - name: Karate API tests
        working-directory: tests/karate
        run: mvn test -DbaseUrl=http://localhost:8080

      - name: Upload Karate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: tests/karate/target/karate-reports

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev -- --host 127.0.0.1 --port 5173 > frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:5173 && exit 0
            sleep 2
          done
          exit 1

      - name: Install Playwright
        working-directory: tests/playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        working-directory: tests/playwright
        env:
          FRONTEND_URL: http://localhost:5173
        run: npm test

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
